<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
        crossorigin="anonymous">
  <title>Historial list</title>
</head>
<body>



<div class="container">

  <div claaa="row">
    <a class="btn btn-primary mt-4 mb-4" th:href="@{/employees}">Empleados</a>
    <a class="btn btn-primary mt-4 mb-4" th:href="@{/historial}">Historial</a>
    <a class="btn btn-primary mt-4 mb-4" th:href="@{/employees}">Reportes</a>
  </div>

  <h2>Historial</h2>

  <table class="table table-sm">
    <tr>
      <th>#</th>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Departamento</th>
      <th>Fecha de Inicio</th>
      <th>Fecha fin</th>
    </tr>
    <tr th:each="historial, info: ${listaHistorial}">
      <td th:text="${info.index + 1}"></td>
      <td th:text="${historial.getIdEmpleado()}"></td>
      <td th:text="${historial.getIdEmpleado()}"></td>
      <td th:text="${historial.getIddepartamento()}"></td>
      <td th:text="${historial.getStartDate()}"></td>
      <td th:text="${historial.getEndDate()}"></td>
    </tr>
  </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-qKXV1j0HvMUeCBQ+QVp7JcfGl760yU08IQ+GpUo5hlbpg51QRiuqHAJz8+BrxE/N"
        crossorigin="anonymous"></script>
</body>
</html>
