<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
        crossorigin="anonymous">
  <title>Employees list</title>
</head>
<body>



<div class="container">

  <div claaa="row">
    <a class="btn btn-primary mt-4 mb-4" th:href="@{/employees}">Empleados</a>
    <a class="btn btn-primary mt-4 mb-4" th:href="@{/historial}">Historial</a>
    <a class="btn btn-primary mt-4 mb-4" th:href="@{/employees}">Reportes</a>
  </div>

  <h2>Lista de Empleados</h2>

  <form method="post" th:action="@{/buscarPorNombreApellido}">
    <div class="input-group mb-3">
      <input name="searchField" class="form-control" type="text" placeholder="Buscar por nombre o apellido" th:value="${textoBuscado}" >
      <button class="btn btn-primary" type="submit">Buscar</button>
      <a class="btn btn-outline-secondary" th:href="@{/employees}">Limpiar</a>
    </div>
  </form>
  <table class="table table-sm">
    <tr>
      <th>#</th>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Puesto</th>
      <th>Departamento</th>
      <th>Número de teléfono</th>
      <th>Salario</th>
      <th></th>
    </tr>
    <tr th:each="employee, info: ${listaEmployees}">
      <td th:text="${info.index + 1}"></td>
      <td th:text="${employee.getNombre()}"></td>
      <td th:text="${employee.getApellido()}"></td>
      <td th:text="${employee.getPuesto()}"></td>
      <td th:text="${employee.getIddepartamento()}"></td>
      <td th:text="${employee.getNumero()}"></td>
      <td th:text="${employee.getSalario()}"></td>
      <td><a class="btn btn-primary" th:href="@{'/editPhoneSalary?id=' + ${employee.idEmpleado}}">Editar</a></td>
    </tr>
  </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-qKXV1j0HvMUeCBQ+QVp7JcfGl760yU08IQ+GpUo5hlbpg51QRiuqHAJz8+BrxE/N"
        crossorigin="anonymous"></script>
</body>
</html>
