<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Empleado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
        crossorigin="anonymous">
</head>
<body>
<main>


  <div class="container px-4 py-5">

    <div claaa="row">
      <a class="btn btn-primary mt-4 mb-4" th:href="@{/employees}">Empleados</a>
      <a class="btn btn-primary mt-4 mb-4" th:href="@{/historial}">Historial</a>
      <a class="btn btn-primary mt-4 mb-4" th:href="@{/employees}">Reportes</a>
    </div>

    <h1 class="pb-2 mb-4 border-bottom">Editar Empleado</h1>
    <form method="post" th:action="@{'/updatePhoneSalary'}" class="col-4" th:object="${employee}">
      <input th:value="${employee.idEmpleado}" name="idEmpleado" type="hidden"/>
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input th:field="*{nombre}" type="text" class="form-control" disabled="disabled"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Apellido</label>
        <input th:field="*{apellido}" type="text" class="form-control" disabled="disabled"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Puesto</label>
        <input th:field="*{puesto}" type="text" class="form-control" disabled="disabled"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Departamento</label>
        <input th:field="*{iddepartamento}" type="text" class="form-control" disabled="disabled"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input th:field="*{numero}" type="text" class="form-control"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Salario</label>
        <input th:field="*{salario}" type="text" class="form-control"/>
      </div>

      <a th:href="@{'/employees'}" class="btn btn-danger">Cancelar</a>
      <button type="submit" class="btn btn-primary">Actualizar</button>
    </form>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
